name = "web-notes-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# 需在 Cloudflare Dashboard 设置以下 Secrets：
# S3_ENDPOINT - S3/R2 端点
# S3_REGION - 区域
# S3_ACCESS_KEY - 访问密钥
# S3_SECRET_KEY - 密钥
# S3_BUCKET - 存储桶名
# S3_PREFIX - 文件前缀
# MS_CLIENT_ID - Azure AD 应用 ID
# MS_CLIENT_SECRET - Azure AD 密钥
# MS_TENANT_ID - Azure AD 租户 ID
